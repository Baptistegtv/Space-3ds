name: Build 3DSX

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: make

      - name: Upload Space.3dsx
        uses: actions/upload-artifact@v4
        with:
          name: Space-3dsx
          path: Space.3dsx
